<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题 - Blog of Rogers </title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/highlight.css">
    <link rel="stylesheet" href="js/katex.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">Blog of Rogers </h1>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="blog.html">文章</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="post-content">
            <header class="post-header">
                <h1 id="post-title">文章加载中...</h1>
                <div class="post-meta">
                    <time id="post-date">日期加载中...</time>
                    <span class="post-views">阅读量: <span id="post-view-count">0</span></span>
                </div>
            </header>
            <div class="post-body" id="post-content">
                内容加载中...
            </div>
        </article>

        <section class="post-comments">
            <h3>评论</h3>
            <div id="comments-container">
                <!-- 评论将通过JavaScript动态加载 -->
            </div>
            <div class="comment-form">
                <h4>发表评论</h4>
                <form id="comment-form">
                    <div class="form-group">
                        <label for="comment-name">昵称</label>
                        <input type="text" id="comment-name" required>
                    </div>
                    <div class="form-group">
                        <label for="comment-email">邮箱 (不会公开)</label>
                        <input type="email" id="comment-email" required>
                    </div>
                    <div class="form-group">
                        <label for="comment-content">评论内容</label>
                        <textarea id="comment-content" rows="4" required></textarea>
                    </div>
                    <button type="submit">提交评论</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Blog of Rogers . 访问量: <span id="visit-count">0</span></p>
        </div>
    </footer>

    <script src="js/marked.min.js"></script>
    <script src="js/highlight.min.js"></script>
    <script src="js/math.min.js"></script>
    <script src="js/katex-auto-render.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/comments.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 从URL获取文章ID
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            
            if (postId) {
                loadPost(postId);
                loadComments(postId);
                incrementPostViewCount(postId);
            } else {
                document.getElementById('post-content').textContent = '文章不存在';
            }
        });
    </script>
</body>
</html>
