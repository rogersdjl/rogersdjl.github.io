<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客文章 - Blog of Rogers </title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="js/katex.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">Blog of Rogers </h1>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="blog.html" class="active">文章</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h2>全部文章</h2>
        </section>

        <section class="blog-posts">
            <div class="post-list" id="all-posts">
                <!-- 博客文章将通过JavaScript动态加载 -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Blog of Rogers . 访问量: <span id="visit-count">0</span></p>
        </div>
    </footer>

    <script src="js/marked.min.js"></script>
    <script src="js/highlight.min.js"></script>
    <script src="js/katex.min.js"></script>
    <script src="js/katex-auto-render.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/stats.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAllPosts();
        });
    </script>
</body>
</html>
